services:

  # ── tty-theme FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override these so the API hits the Docker-internal emulator, not localhost
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
      - ENVIRONMENT=development
    depends_on:
      firebase-emulator:
        condition: service_healthy
    restart: unless-stopped

  # ── Firebase Emulator Suite ────────────────────────────────────────────────
  # Covers: Firestore (8080), Auth (9099), Hosting (5000), UI (4000)
  firebase-emulator:
    image: andreysenov/firebase-tools:latest
    command: >
      firebase emulators:start
        --project tty-theme-local
        --import /firebase-data
        --export-on-exit /firebase-data
    ports:
      - "4000:4000"   # Emulator UI
      - "5000:5000"   # Hosting emulator
      - "8080:8080"   # Firestore emulator
      - "9099:9099"   # Auth emulator
    volumes:
      - ./firebase.json:/app/firebase.json:ro
      - ./firestore.rules:/app/firestore.rules:ro
      - firebase-data:/firebase-data
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Prometheus (optional monitoring profile) ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

volumes:
  firebase-data:
